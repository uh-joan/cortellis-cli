# Drug-comparison skill — machine-parseable DAG workflow
#
# parse_drugs.py output: comparison,<slug>  (e.g. comparison,tirzepatide-vs-semaglutide)
# Wave 1: resolve (parse drug names, produce stable dir slug)
# Wave 2: fetch_all (resolve each drug + fetch record/trials/deals/financials)
# Wave 3: generate (comparison report)

name: drug-comparison
description: |
  Use when: user compares 2–5 drugs side by side.
  Triggers: "drug-comparison X vs Y", "/drug-comparison", "compare drugs X vs Y",
  "X versus Y", "head to head X and Y"
model: opus
argument-hint: "<drug1> vs <drug2> [vs <drug3> ...]"

nodes:

  # ── Step 1: Parse drug names and produce a stable comparison slug ──────────

  - id: resolve
    bash: "python3 cli_anything/cortellis/skills/drug-comparison/recipes/parse_drugs.py $ARGUMENTS"
    model: haiku
    # Output: comparison,<slug>  (field 1 slugified → comparison dir name)

  # ── Step 2: Resolve + fetch all drug data ─────────────────────────────────

  - id: fetch_all
    bash: |
      python3 cli_anything/cortellis/skills/drug-comparison/recipes/fetch_comparison_data.py \
        $ARGUMENTS \
        raw/comparisons/$resolve.output.comparison_name
    depends_on: [resolve]
    api_calls: true

  # ── Step 3: Generate comparison report ────────────────────────────────────

  - id: generate
    bash: |
      python3 cli_anything/cortellis/skills/drug-comparison/recipes/drug_comparison_generator.py \
        raw/comparisons/$resolve.output.comparison_name \
        | tee raw/comparisons/$resolve.output.comparison_name/comparison.md
    depends_on: [fetch_all]
    model: opus
